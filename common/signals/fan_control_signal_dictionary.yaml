signal_dictionary_id: fan_control_signal_dictionary_v1

description: >
  Canonical signal dictionary for the fan control Mini-SILS-HILS PoC.

signals:
  - name: time_sec
    direction: input
    unit: s
    data_type: float
    description: Logical scenario time.

  - name: coolant_temp_deg_c
    direction: input
    unit: degC
    data_type: float
    description: Coolant temperature input to the fan control logic.

  - name: fan_command
    direction: output
    unit: boolean
    data_type: bool
    description: Fan ON/OFF command generated by the control logic.
