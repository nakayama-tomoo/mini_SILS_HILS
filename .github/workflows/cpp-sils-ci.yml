name: C++ SILS CI

on:
  push:
    branches:
      - main
      - restructure/vmodel-lifecycle
      - phase11-ci-cpp-build-test
    paths:
      - ".github/workflows/cpp-sils-ci.yml"
      - "implementations/cpp_sils/**"
      - "implementations/python_sils/**"
      - "common/scenario/**"
      - "tools/run_suite.py"
      - "tools/compare_python_cpp_results.py"
      - "versions/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "pyproject.toml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/cpp-sils-ci.yml"
      - "implementations/cpp_sils/**"
      - "implementations/python_sils/**"
      - "common/scenario/**"
      - "tools/run_suite.py"
      - "tools/compare_python_cpp_results.py"
      - "versions/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cpp-sils-build-test:
    name: C++ SILS build/test and Python comparison
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        run: |
          cd implementations/python_sils
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install C++ build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            libgtest-dev

      - name: Configure CMake
        run: |
          cmake \
            -S implementations/cpp_sils \
            -B implementations/cpp_sils/build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ targets
        run: |
          cmake --build implementations/cpp_sils/build --parallel 2

      - name: Run C++ unit tests
        run: |
          ctest \
            --test-dir implementations/cpp_sils/build \
            --output-on-failure

      - name: Run suite orchestration
        run: |
          python tools/run_suite.py

      - name: Compare Python and C++ results
        run: |
          python tools/compare_python_cpp_results.py

      - name: Show comparison summary
        if: always()
        run: |
          python -m json.tool results/comparison_summary.json

      - name: Upload Phase 11 C++ SILS evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase11-cpp-sils-evidence
          path: |
            implementations/cpp_sils/results/*.csv
            implementations/python_sils/cpp/results/*.csv
            implementations/python_sils/results/fan_control/*.csv
            results/comparison_summary.json
            results/suite_summary.json
            results/all_results_summary.json
          if-no-files-found: warn
          retention-days: 14
