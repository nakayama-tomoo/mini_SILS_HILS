name: C++ SILS CI

on:
  push:
    branches:
      - main
      - restructure/vmodel-lifecycle
      - phase11-ci-cpp-build-test
      - phase12-ci-evidence-static-analysis-prep
    paths:
      - ".github/workflows/cpp-sils-ci.yml"
      - "implementations/cpp_sils/**"
      - "implementations/python_sils/**"
      - "common/scenario/**"
      - "tools/run_suite.py"
      - "tools/compare_python_cpp_results.py"
      - "versions/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "pyproject.toml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/cpp-sils-ci.yml"
      - "implementations/cpp_sils/**"
      - "implementations/python_sils/**"
      - "common/scenario/**"
      - "tools/run_suite.py"
      - "tools/compare_python_cpp_results.py"
      - "versions/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cpp-sils-build-test:
    name: C++ SILS build/test and Python comparison
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        run: |
          cd implementations/python_sils
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install C++ build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            libgtest-dev

      - name: Configure CMake
        run: |
          cmake \
            -S implementations/cpp_sils \
            -B implementations/cpp_sils/build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ targets
        run: |
          cmake --build implementations/cpp_sils/build --parallel 2

      - name: Run C++ unit tests
        run: |
          ctest \
            --test-dir implementations/cpp_sils/build \
            --output-on-failure

      - name: Run suite orchestration
        run: |
          python tools/run_suite.py

      - name: Compare Python and C++ results
        run: |
          python tools/compare_python_cpp_results.py

      - name: List Phase 12 C++ evidence files
        if: always()
        run: |
          find results -maxdepth 2 -type f -print | sort || true
          find implementations/cpp_sils/results -maxdepth 1 -type f -print | sort || true
          find implementations/python_sils/results/fan_control -maxdepth 1 -type f -print | sort || true

      - name: Validate Phase 12 C++ mandatory evidence files
        run: |
          test -f results/suite_summary.json
          test -f results/all_results_summary.json
          test -d implementations/cpp_sils/results
          test -n "$(find implementations/cpp_sils/results -name '*.csv' -print -quit)"
          test -d implementations/python_sils/results/fan_control
          test -n "$(find implementations/python_sils/results/fan_control -name '*.csv' -print -quit)"

          if [ -f results/comparison_summary.json ]; then
            echo "results/comparison_summary.json is available."
          else
            echo "results/comparison_summary.json is not generated in this workflow; treating it as optional for Phase 12 evidence packaging."
          fi

      - name: Show comparison summary
        if: always()
        run: |
          if [ -f results/comparison_summary.json ]; then
            python -m json.tool results/comparison_summary.json
          else
            echo "results/comparison_summary.json is not available."
          fi

      - name: Prepare Phase 12 C++ SILS evidence metadata
        if: always()
        run: |
          mkdir -p reports/ci

          cat > reports/ci/metadata.json <<EOF
          {
            "phase": "Phase 12",
            "workflow": "${{ github.workflow }}",
            "job": "cpp-sils-build-test",
            "commit_sha": "${{ github.sha }}",
            "ref_name": "${{ github.ref_name }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "scenario_suite": "SC_01_to_SC_05"
          }
          EOF

          {
            echo "python_version=$(python --version 2>&1 || true)"

            if command -v cmake >/dev/null 2>&1; then
              echo "cmake_version=$(cmake --version | head -n 1)"
            else
              echo "cmake_version=not_available"
            fi

            if command -v g++ >/dev/null 2>&1; then
              echo "gxx_version=$(g++ --version | head -n 1)"
            else
              echo "gxx_version=not_available"
            fi
          } > reports/ci/tool-versions.txt

      - name: Upload Phase 12 C++ SILS evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase12-cpp-sils-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            reports/ci/metadata.json
            reports/ci/tool-versions.txt
            implementations/cpp_sils/results/*.csv
            implementations/python_sils/cpp/results/*.csv
            implementations/python_sils/results/fan_control/*.csv
            results/*.json
          if-no-files-found: error
          retention-days: 14
