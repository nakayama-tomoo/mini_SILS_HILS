name: AWS S3 Evidence Upload

on:
  workflow_run:
    workflows:
      - CPP SILS CI
    types:
      - completed

jobs:
  upload-evidence:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show workflow_run information
        run: |
          echo "workflow: ${{ github.event.workflow_run.name }}"
          echo "run_id: ${{ github.event.workflow_run.id }}"
          echo "head_branch: ${{ github.event.workflow_run.head_branch }}"
          echo "head_sha: ${{ github.event.workflow_run.head_sha }}"
          echo "conclusion: ${{ github.event.workflow_run.conclusion }}"

      - name: Download CPP SILS artifact
        uses: actions/download-artifact@v5
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: phase12-cpp-sils-evidence
          path: downloaded-artifacts/cpp

      - name: Show downloaded files
        if: always()
        run: |
          pwd
          find downloaded-artifacts || true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Upload verification report
        run: |
          aws s3 cp \
            results/verification_report.md \
            s3://mini-sils-hils-evidence-tomoo/phase27/verification_report.md

      - name: Upload evidence manifest
        run: |
          aws s3 cp \
            evidence/evidence_manifest.json \
            s3://mini-sils-hils-evidence-tomoo/phase27/evidence_manifest.json

      - name: Upload comparison summary
        run: |
          aws s3 cp \
            results/comparison_summary.json \
            s3://mini-sils-hils-evidence-tomoo/phase27/comparison_summary.json

      - name: Upload coverage matrix
        run: |
          aws s3 cp \
            traceability/coverage_matrix.json \
            s3://mini-sils-hils-evidence-tomoo/phase27/coverage_matrix.json

