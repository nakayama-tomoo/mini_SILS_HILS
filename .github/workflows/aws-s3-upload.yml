name: AWS S3 Evidence Upload

on:
  workflow_run:
    workflows:
      - CPP SILS CI
    types:
      - completed

jobs:
  upload-evidence:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show workflow_run information
        run: |
          echo "workflow: ${{ github.event.workflow_run.name }}"
          echo "run_id: ${{ github.event.workflow_run.id }}"
          echo "head_branch: ${{ github.event.workflow_run.head_branch }}"
          echo "head_sha: ${{ github.event.workflow_run.head_sha }}"
          echo "conclusion: ${{ github.event.workflow_run.conclusion }}"

      - name: Show artifact list from source workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "SOURCE RUN ID=${{ github.event.workflow_run.id }}"

          curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts \
            > artifacts.json

          echo "===== artifact list ====="
          cat artifacts.json

      - name: Download artifact zip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_ID=$(python3 -c "import json; print(json.load(open('artifacts.json'))['artifacts'][0]['id'])")

          echo "ARTIFACT_ID=${ARTIFACT_ID}"

          curl -L \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip \
            -o artifact.zip

          ls -lh artifact.zip


      - name: Extract artifact
        run: |
          mkdir -p extracted-artifact
          unzip artifact.zip -d extracted-artifact

          echo "===== extracted files ====="
          find extracted-artifact | sort


#      - name: Download CPP SILS artifact
#        uses: actions/download-artifact@v5
#        with:
#          run-id: ${{ github.event.workflow_run.id }}
#          name: phase12-cpp-sils-evidence
#          path: downloaded-artifacts/cpp

      - name: Show downloaded files
        if: always()
        run: |
          pwd
          find downloaded-artifacts || true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Upload verification report
        run: |
          aws s3 cp \
            results/verification_report.md \
            s3://mini-sils-hils-evidence-tomoo/phase27/verification_report.md

      - name: Upload evidence manifest
        run: |
          aws s3 cp \
            evidence/evidence_manifest.json \
            s3://mini-sils-hils-evidence-tomoo/phase27/evidence_manifest.json

      - name: Upload comparison summary
        run: |
          aws s3 cp \
            results/comparison_summary.json \
            s3://mini-sils-hils-evidence-tomoo/phase27/comparison_summary.json

      - name: Upload coverage matrix
        run: |
          aws s3 cp \
            traceability/coverage_matrix.json \
            s3://mini-sils-hils-evidence-tomoo/phase27/coverage_matrix.json

