name: AWS S3 Evidence Upload

on:
  workflow_dispatch:

jobs:
  upload-evidence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        run: |
          cd implementations/python_sils
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run SILS suite
        run: |
          python tools/run_suite.py

      - name: Compare results
        run: |
          python tools/compare_python_cpp_results.py

      - name: Generate evidence manifest
        run: |
          python tools/generate_evidence_manifest.py

      - name: Generate coverage matrix
        run: |
          python tools/generate_coverage_matrix.py

      - name: Generate verification report
        run: |
          python tools/generate_verification_report.py

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Upload verification report
        run: |
          aws s3 cp \
            results/verification_report.md \
            s3://mini-sils-hils-evidence-tomoo/phase27/verification_report.md

      - name: Upload evidence manifest
        run: |
          aws s3 cp \
            evidence/evidence_manifest.json \
            s3://mini-sils-hils-evidence-tomoo/phase27/evidence_manifest.json

      - name: Upload comparison summary
        run: |
          aws s3 cp \
            results/comparison_summary.json \
            s3://mini-sils-hils-evidence-tomoo/phase27/comparison_summary.json

      - name: Upload coverage matrix
        run: |
          aws s3 cp \
            traceability/coverage_matrix.json \
            s3://mini-sils-hils-evidence-tomoo/phase27/coverage_matrix.json

