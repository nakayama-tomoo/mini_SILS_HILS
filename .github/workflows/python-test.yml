name: Python and C++ mini SILS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        run: |
          cd mini-sils-poc
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: |
          cd mini-sils-poc
          python -m pytest

      - name: Install CMake and compiler tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            libgtest-dev

      - name: Configure CMake
        run: cmake -S mini-sils-poc/cpp -B mini-sils-poc/cpp/build

      - name: Build C++ targets
        run: cmake --build mini-sils-poc/cpp/build

      - name: Run CTest
        run: |
          cd mini-sils-poc/cpp/build
          ctest --output-on-failure

      - name: Run suite orchestration
        run: python tools/run_suite.py

      - name: Compare Python and C++ results
        run: python tools/compare_python_cpp_results.py

      - name: Docker build
        run: |
          docker build \
            -t mini-sils-poc \
            -f mini-sils-poc/docker/Dockerfile \
            mini-sils-poc

#      - name: Docker run
#        run: |
#          docker run --rm mini-sils-poc

      - name: Upload Python SILS result CSV
        uses: actions/upload-artifact@v7
        with:
          name: python-fan-control-results
          path: mini-sils-poc/results/fan_control/*.csv
          if-no-files-found: error
          retention-days: 14

      - name: Upload C++ SILS result CSV
        uses: actions/upload-artifact@v7
        with:
          name: cpp-fan-control-results
          path: mini-sils-poc/cpp/results/*.csv
          if-no-files-found: error
          retention-days: 14

      - name: Upload suite summary
        uses: actions/upload-artifact@v7
        with:
          name: suite-summary
          path: results/suite_summary.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload comparison summary
        uses: actions/upload-artifact@v7
        with:
          name: comparison-summary
          path: results/comparison_summary.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload all results summary
        uses: actions/upload-artifact@v7
        with:
          name: all-results-summary
          path: results/all_results_summary.json
          if-no-files-found: error
          retention-days: 14
