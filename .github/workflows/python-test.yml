name: Python SILS CI

on:
  push:
    branches:
      - main
      - phase12-ci-evidence-static-analysis-prep
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        run: |
          cd implementations/python_sils
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: |
          mkdir -p reports/python
          cd implementations/python_sils
          python -m pytest --junitxml=../../reports/python/pytest-results.xml

      - name: Run governance checks
        run: python tools/run_governance_checks.py
      - name: Ensure generated artifacts are committed
        run: git diff --exit-code

      - name: Check evidence manifest references
        run: python tools/check_evidence_manifest.py

      - name: Validate evidence files
        run: |
          python -m json.tool evidence/evidence_manifest.json > /tmp/evidence_manifest_check.json
          test -f evidence/evidence_manifest.json
          test -f evidence/dependencies/python_freeze.txt
          test -f evidence/dependencies/README.md

      - name: Docker build
        run: |
          docker build \
            -t mini-sils-python-sils \
            -f implementations/python_sils/docker/Dockerfile \
            .

      - name: Docker run
        run: docker run --rm mini-sils-python-sils

      - name: Prepare Phase 12 Python SILS evidence metadata
        if: always()
        run: |
          mkdir -p reports/ci

          cat > reports/ci/metadata.json <<EOF
          {
            "phase": "Phase 12",
            "workflow": "${{ github.workflow }}",
            "job": "test",
            "commit_sha": "${{ github.sha }}",
            "ref_name": "${{ github.ref_name }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "scope": "python_sils_pytest_governance_docker"
          }
          EOF

          {
            echo "python_version=$(python --version 2>&1 || true)"
            echo "pip_version=$(python -m pip --version 2>&1 || true)"
          } > reports/ci/tool-versions.txt

      - name: Validate Phase 12 Python evidence files
        if: always()
        run: |
          test -f reports/python/pytest-results.xml
          test -f reports/ci/metadata.json
          test -f reports/ci/tool-versions.txt
          test -f evidence/evidence_manifest.json
          test -f evidence/dependencies/python_freeze.txt
          test -f evidence/dependencies/README.md

      - name: Upload Phase 12 Python SILS evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase12-python-sils-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            reports/python/pytest-results.xml
            reports/ci/metadata.json
            reports/ci/tool-versions.txt
            evidence/evidence_manifest.json
            evidence/dependencies/python_freeze.txt
            evidence/dependencies/README.md
          if-no-files-found: error
          retention-days: 14
