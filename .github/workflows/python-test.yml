name: Python and C++ mini SILS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        run: |
          cd implementations/python_sils
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: |
          cd implementations/python_sils
          python -m pytest

      - name: Install CMake and compiler tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            libgtest-dev

      - name: Configure CMake
        run: cmake -S implementations/python_sils/cpp -B implementations/python_sils/cpp/build

      - name: Build C++ targets
        run: cmake --build implementations/python_sils/cpp/build

      - name: Run CTest
        run: |
          cd implementations/python_sils/cpp/build
          ctest --output-on-failure

      - name: Run suite orchestration
        run: python tools/run_suite.py

      - name: Compare Python and C++ results
        run: python tools/compare_python_cpp_results.py

      - name: Run governance checks
        run: python tools/run_governance_checks.py

      - name: Check evidence manifest references
        run: python tools/check_evidence_manifest.py

      - name: Validate evidence files
        run: |
          python -m json.tool evidence/evidence_manifest.json > /tmp/evidence_manifest_check.json
          test -f evidence/evidence_manifest.json
          test -f evidence/dependencies/python_freeze.txt
          test -f evidence/dependencies/README.md

      - name: Docker build
        run: |
          docker build \
            -t implementations/python_sils \
            -f implementations/python_sils/docker/Dockerfile \
            implementations/python_sils

#      - name: Docker run
#        run: |
#          docker run --rm implementations/python_sils

      - name: Upload Python SILS result CSV
        uses: actions/upload-artifact@v7
        with:
          name: python-fan-control-results
          path: implementations/python_sils/results/fan_control/*.csv
          if-no-files-found: error
          retention-days: 14

      - name: Upload C++ SILS result CSV
        uses: actions/upload-artifact@v7
        with:
          name: cpp-fan-control-results
          path: implementations/python_sils/cpp/results/*.csv
          if-no-files-found: error
          retention-days: 14

      - name: Upload suite summary
        uses: actions/upload-artifact@v7
        with:
          name: suite-summary
          path: results/suite_summary.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload comparison summary
        uses: actions/upload-artifact@v7
        with:
          name: comparison-summary
          path: results/comparison_summary.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload all results summary
        uses: actions/upload-artifact@v7
        with:
          name: all-results-summary
          path: results/all_results_summary.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload evidence package
        uses: actions/upload-artifact@v7
        with:
          name: evidence-package
          path: |
            evidence/evidence_manifest.json
            evidence/dependencies/python_freeze.txt
            evidence/dependencies/README.md
          if-no-files-found: error
          retention-days: 14
